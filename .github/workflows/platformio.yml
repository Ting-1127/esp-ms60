name: PlatformIO Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Build ms-60
        run: pio run

      - name: Package firmware
        run: |
          mkdir -p dist
          cd .pio/build/esp32-s3-devkitc-1
          zip -r ../../../dist/ms-60-firmware.zip firmware.bin bootloader.bin partitions.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ms-60-firmware
          path: dist/ms-60-firmware.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ms-60-firmware.zip
