name: PlatformIO Build

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (ESP32-S3-N16R8)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PIO_ENV: esp32s3_n16r8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Cache PIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-pkg-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-pkg-${{ runner.os }}-

      - name: Cache PIO build
        uses: actions/cache@v4
        with:
          path: .pio
          key: pio-build-${{ runner.os }}-${{ hashFiles('src/**', 'lib/**', 'include/**', 'platformio.ini') }}
          restore-keys: |
            pio-build-${{ runner.os }}-

      - name: Build firmware
        run: platformio run --environment $PIO_ENV

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: .pio/build/${{ env.PIO_ENV }}/firmware.bin
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: .pio/build/${{ env.PIO_ENV }}/firmware.bin
