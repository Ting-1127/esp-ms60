name: PlatformIO Build

# ============================================================
# 触发条件
# ============================================================
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main]
  workflow_dispatch:     # 允许手动触发

# ============================================================
# 编译任务
# ============================================================
jobs:
  build:
    name: Build (ESP32-S3-N16R8)
    runs-on: ubuntu-latest

    env:
      PIO_ENV: esp32s3_n16r8

    steps:
      # ---- 1. 检出代码 ----
      - name: Checkout
        uses: actions/checkout@v4

      # ---- 2. 缓存 pip 包 ----
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            pip-${{ runner.os }}-

      # ---- 3. 安装 Python ----
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # ---- 4. 安装 PlatformIO ----
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      # ---- 5. 缓存 PlatformIO 包 (框架 & 库) ----
      - name: Cache PIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-pkg-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-pkg-${{ runner.os }}-

      # ---- 6. 缓存编译产物 (.pio) ----
      - name: Cache PIO build
        uses: actions/cache@v4
        with:
          path: .pio
          key: pio-build-${{ runner.os }}-${{ hashFiles('src/**', 'lib/**', 'include/**', 'platformio.ini') }}
          restore-keys: |
            pio-build-${{ runner.os }}-

      # ---- 7. 编译 ----
      - name: Build firmware
        run: platformio run --environment $PIO_ENV

      # ---- 8. 上传产物 ----
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            .pio/build/${{ env.PIO_ENV }}/firmware.bin
            .pio/build/${{ env.PIO_ENV }}/bootloader.bin
            .pio/build/${{ env.PIO_ENV }}/partitions.bin
          retention-days: 14
